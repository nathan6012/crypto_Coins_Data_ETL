# prefect.yaml
name: etl_github-deployment
flow_name: ETL_Crypto_Flow
entrypoint: src/main.py:master_flow_etl
work_pool_name: My_etl_system

pull:
  - prefect.deployments.steps.git_clone:
      repository: https://github.com/nathan6012/crypto_Coins_Data_ETL.git

deployments:
  - name: crypto-managed-run
    work_pool:
      name: My_etl_system
      job_variables:
        pip_packages: 
          - pandas
          - pydantic
          - sqlalchemy
          - httpx
          - aiolimiter
          - python-dotenv
          - pytest
          - pytest-asyncio
          - respx
          
          
